project:
  name: quality_aware_synth_aug
  seed: 42

paths:
  raw_data_dir: data/raw
  synthetic_data_dir: data/synthetic
  augmented_data_dir: data/augmented
  logs_dir: logs
  models_dir: models

datasets:
  ner:
    hf_name: conll2003
    output_dir: data/raw/ner
  sentiment:
    hf_name: glue
    hf_subset: sst2
    output_dir: data/raw/sentiment

generation:
  device: mps
  ner_model_name: google/flan-t5-base
  sentiment_model_name: google/flan-t5-base
  max_input_length: 256
  max_output_length: 128
  temperature: 0.9
  do_sample: true
  num_return_sequences: 1

llm:
  provider: groq
  model_name: llama-3.1-8b-instant
  temperature: 0.7
  max_retries: 5

synthetic:
  ner_samples: 800
  sentiment_samples: 2000

filtering:
  weights:
    fluency: 0.30
    label_consistency: 0.40
    diversity: 0.20
    duplication: 0.10

  thresholds:
    ner_min_quality: 0.62
    sentiment_min_quality: 0.50

  duplicate_similarity_threshold: 0.90

augmentation:
  ner_base_subset: 5000
  sentiment_base_subset: 15000

training:
  ner_model_name: distilbert-base-uncased
  sentiment_model_name: distilbert-base-uncased
  output_dir: models
  max_length: 128
  batch_size: 8
  epochs: 3
  learning_rate: 3.0e-5
  weight_decay: 0.01